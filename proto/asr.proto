syntax = "proto3";
package cyberverse;

option go_package = "github.com/cyberverse/server/internal/pb";

import "common.proto";

service ASRService {
  rpc TranscribeStream (stream ASRInput) returns (stream TranscriptEvent);
}

message ASRConfig {
  string provider = 1;
  string language = 2;
  string session_id = 3;
}

message ASRInput {
  oneof input {
    ASRConfig config = 1;
    AudioChunk audio = 2;
  }
}

message TranscriptEvent {
  string text = 1;
  bool is_final = 2;
  string language = 3;
  float confidence = 4;
}
