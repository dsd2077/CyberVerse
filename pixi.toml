[workspace]
authors = ["CyberVerse contributors"]
channels = ["conda-forge"]
name = "cyberverse"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[feature.macos-arm]
platforms = ["osx-arm64"]

[feature.macos-arm.dependencies]
bash = ">=5.2.37,<6"
c-compiler = ">=1.11.0,<2"
ffmpeg = ">=8.1.1,<9"
git = ">=2.54.0,<3"
go = "1.25.*"
libopus = ">=1.6.1,<2"
make = ">=4.4.1,<5"
nodejs = "22.*"
opusfile = ">=0.12,<0.13"
pkg-config = ">=0.29.2,<0.30"
python = "3.10.*"
soxr = ">=0.1.3,<0.2"

[feature.macos-arm.pypi-dependencies]
cyberverse = { path = ".", editable = true, extras = ["dev", "inference", "agent", "llm", "tts", "omni", "voice_llm", "qwen"] }

[feature.linux-x86]
platforms = ["linux-64"]

[feature.linux-x86.dependencies]
bash = ">=5.2.37,<6"
c-compiler = ">=1.11.0,<2"
ffmpeg = ">=8.1.1,<9"
git = ">=2.54.0,<3"
go = "1.25.*"
libopus = ">=1.6.1,<2"
make = ">=4.4.1,<5"
nodejs = "22.*"
opusfile = ">=0.12,<0.13"
pkg-config = ">=0.29.2,<0.30"
python = "3.10.*"
soxr = ">=0.1.3,<0.2"

[feature.linux-x86.pypi-dependencies]
cyberverse = { path = ".", editable = true, extras = ["dev", "inference", "agent", "llm", "tts", "omni", "voice_llm", "qwen"] }

[feature.common.tasks]
proto = "./scripts/generate_proto.sh"
python-test = { cmd = "python -m pytest tests/unit -v", depends-on = ["proto"] }
python-agent-test = "python -m pytest tests/unit/test_agent_runtime_llm.py tests/unit/test_persona_agent_plugin.py -q"
frontend-install = "npm install --prefix frontend"
frontend-build = "npm run --prefix frontend build"
frontend-dev = "npm run --prefix frontend dev"
agent-worker = "uvicorn agent_runtime.server:app --host 127.0.0.1 --port 8090"
go-test = { cmd = "go test ./... -v", cwd = "server", env = { CGO_ENABLED = "1", GOPROXY = "https://goproxy.cn,direct", GOSUMDB = "sum.golang.google.cn", PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH", DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH", LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" } }
go-build = { cmd = "go build -tags livekit -o ../bin/cyberverse-server ./cmd/cyberverse-server/", cwd = "server", env = { CGO_ENABLED = "1", GOPROXY = "https://goproxy.cn,direct", GOSUMDB = "sum.golang.google.cn", PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH", DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH", LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" } }
server = { cmd = "go run -tags livekit ./cmd/cyberverse-server/ --config ../cyberverse_config.yaml", cwd = "server", env = { CGO_ENABLED = "1", GOPROXY = "https://goproxy.cn,direct", GOSUMDB = "sum.golang.google.cn", PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH", DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$DYLD_LIBRARY_PATH", LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" } }
dev = { cmd = "bash -lc 'set -euo pipefail; if [ ! -f cyberverse_config.yaml ]; then echo \"[dev] missing cyberverse_config.yaml; copy infra/cyberverse_config.example.yaml first\" >&2; exit 1; fi; if [ -f .env ]; then set -a; . ./.env; set +a; fi; export CGO_ENABLED=1; export PKG_CONFIG_PATH=\"$CONDA_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}\"; export DYLD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:${DYLD_LIBRARY_PATH:-}\"; export LD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}\"; pids=\"\"; cleanup() { status=${1:-$?}; trap - INT TERM EXIT; if [ -n \"$pids\" ]; then kill $pids 2>/dev/null || true; wait $pids 2>/dev/null || true; fi; exit \"$status\"; }; trap \"cleanup 130\" INT; trap \"cleanup 143\" TERM; trap \"cleanup $?\" EXIT; echo \"[dev] starting inference, server, and frontend\"; bash ./scripts/inference.sh cyberverse_config.yaml & pids=\"$pids $!\"; (cd server && go run -tags livekit ./cmd/cyberverse-server/ --config ../cyberverse_config.yaml) & pids=\"$pids $!\"; npm install --prefix frontend && npm run --prefix frontend dev & pids=\"$pids $!\"; wait -n $pids; cleanup $?'" }
test = [{ task = "python-test" }, { task = "go-test" }]
build = [{ task = "go-build" }, { task = "frontend-build" }]

[environments]
macos-arm = { features = ["common", "macos-arm"], no-default-feature = true }
linux-x86 = { features = ["common", "linux-x86"], no-default-feature = true }
